<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="https://unpkg.com/vue@next"></script>
    <title>Vite App</title>
    <style>
      [v-cloak] {
        display: none
      }
    </style>
  </head>
  <body>
    <div id="app">
      <p v-cloak>{{ message }}</p>
    </div>
    <script>
      const App = {
        data() {
          return {
            message: '안녕하세요'
          }
        }
      }
      setTimeout(() => {
        Vue.createApp(App).mount('#app')
      }, 3000)
/*
[v-cloak]
- 역할 : 콧수염({{ }}) 깜빡임 방지용
  Vue 코드가 로딩되고 컴파일되기 전, 
  아주 찰나의 순간에 HTML 화면에 {{ message }} 같은 
  중괄호 문법(콧수염 문법)이 그대로 노출되는 현상을 막아주는 역할입니다.
- 동작 원리: Vue 인스턴스가 준비될 때까지 해당 HTML 태그를 숨겨둡니다.
- 사용 조건: 반드시 CSS와 세트로 사용해야 합니다.
*/
    </script>
  </body>
</html>
